kind = "web"
previewPath = "/"
title = "Financial Ratio Calculator"
version = "1.0.0"
id = "artifacts/financial-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25363

[services.development]
run = "pnpm --filter @workspace/financial-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financial-calculator", "run", "build" ]
publicDir = "artifacts/financial-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25363"
BASE_PATH = "/"
